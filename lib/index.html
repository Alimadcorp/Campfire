<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campfire Engine</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/timeago.js/4.0.2/timeago.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --panel: #080808;
      --card: #0c0c0e;
      --accent: #3b82f6;
      --success: #10b981;
      --error: #f43f5e;
      --text: #ffffff;
      --text-dim: #444446;
      --border: #141416;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #void {
      flex: 1;
    }

    #engine {
      width: 460px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 50px rgba(0, 0, 0, 0.9);
    }

    header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-dim);
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--error);
      box-shadow: 0 0 5px var(--error);
    }

    .dot.on {
      background: var(--success);
      box-shadow: 0 0 5px var(--success);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.1s;
    }

    button:hover {
      color: #fff;
      border-color: #333;
    }

    button.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }

    .check-all-btn {
      grid-column: span 2;
      border-style: dashed;
      display: none;
      color: var(--success);
    }

    #stream {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem;
      position: relative;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      margin-bottom: 0rem;
    }

    .card-user {
      font-weight: 900;
      color: #52525b;
    }

    .card-time {
      color: var(--text-dim);
    }

    .card-data {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #ccc;
      word-break: break-all;
      line-height: 1.4;
    }

    .card-actions {
      margin-top: 0rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-label {
      font-size: 0.6rem;
      font-weight: 900;
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .mini-btn {
      padding: 0;
      margin: 0;
      font-size: 0.6rem;
      border: none;
      color: var(--accent);
    }

    #scanners-list {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .scanner {
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: help;
      position: relative;
    }

    .scanner:hover {
      background: #0c0c0e;
    }

    .scanner-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }

    .scanner-ip {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .tooltip {
      position: absolute;
      right: calc(100% + 1rem);
      top: 50%;
      transform: translateY(-100%);
      background: #000;
      border: 1px solid var(--border);
      padding: 1rem;
      width: 240px;
      border-radius: 8px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: 0.15s;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
    }

    .scanner:hover .tooltip {
      opacity: 1;
      visibility: visible;
    }

    .tooltip-data {
      display: grid;
      gap: 0.4rem;
      font-size: 0.7rem;
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
    }

    .tt-label {
      color: var(--text-dim);
    }

    ::-webkit-scrollbar {
      width: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: #111;
    }

    /* ── Login Overlay ── */
    #login-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s, visibility 0.4s;
    }

    #login-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .login-box {
      width: 340px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .login-box .logo {
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .login-field label {
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
    }

    .login-field input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.55rem 0.7rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .login-field input:focus {
      border-color: var(--accent);
    }

    .login-field input::placeholder {
      color: #2a2a2c;
    }

    #login-btn {
      padding: 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--accent);
      background: rgba(59, 130, 246, 0.08);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }

    #login-btn:hover {
      background: rgba(59, 130, 246, 0.15);
    }

    #login-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .login-error {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--error);
      text-align: center;
      min-height: 1em;
    }

    .channel-badge {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-box">
      <div class="logo">CAMPFIRE // ENG</div>
      <div class="login-field">
        <label>Channel</label>
        <input id="login-channel" type="text" placeholder="channel-name" autocomplete="off" spellcheck="false" />
      </div>
      <div class="login-field">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="off" />
      </div>
      <div id="login-error" class="login-error"></div>
      <button id="login-btn">CONNECT</button>
    </div>
  </div>

  <div id="void"></div>

  <div id="engine" style="display:none;">
    <header>
      <div class="top-bar">
        <div class="logo">CAMPFIRE // ENG <span id="channel-label" class="channel-badge"></span></div>
        <div class="status">
          <div id="dot" class="dot"></div>
          <span id="stat-text">OFF</span>
          <span style="opacity:0.1">|</span>
          <i data-lucide="users" style="width:10px"></i>
          <span id="l-count">0</span>
        </div>
      </div>

      <div class="actions">
        <button id="modeNew" class="active">REALTIME</button>
        <button id="modeAll">HISTORY</button>
        <button id="checkAll" class="check-all-btn">VALIDATE ALL</button>
      </div>
    </header>

    <div id="stream"></div>

    <div id="scanners-list">
      <div style="font-size: 0.6rem; font-weight: 900; color:var(--text-dim); margin-bottom: 0.5rem;">ONLINE</div>
      <div id="scanners"></div>
    </div>
  </div>

  <script>
    window.onerror = (m, u, l, c, e) => {
      console.warn("Recovered from engine error:", m);
      return true;
    };

    const API = "https://reflect.alimad.co/";
    let scans = [];
    let showHistory = false;
    let ws;
    let lastIps = [];
    let lastMeta = {};
    let authChannel = null;
    let authPassword = null;

    const stream = document.getElementById("stream");
    const scannersEl = document.getElementById("scanners");
    const dot = document.getElementById("dot");
    const statText = document.getElementById("stat-text");
    const lCount = document.getElementById("l-count");
    const loginOverlay = document.getElementById("login-overlay");
    const engineEl = document.getElementById("engine");
    const channelLabel = document.getElementById("channel-label");
    const loginBtn = document.getElementById("login-btn");
    const loginError = document.getElementById("login-error");
    const loginChannelInput = document.getElementById("login-channel");
    const loginPasswordInput = document.getElementById("login-password");

    // Restore saved credentials
    const savedChannel = localStorage.getItem("cf_channel");
    const savedPassword = localStorage.getItem("cf_password");
    if (savedChannel) loginChannelInput.value = savedChannel;
    if (savedPassword) loginPasswordInput.value = savedPassword;

    function showEngine() {
      loginOverlay.classList.add("hidden");
      engineEl.style.display = "flex";
      if (channelLabel) channelLabel.textContent = "// " + authChannel;
    }

    function showLoginError(msg) {
      loginError.textContent = msg;
      loginBtn.disabled = false;
      loginBtn.textContent = "CONNECT";
    }

    function connect() {
      try {
        const host = location.host.endsWith(":5500") ? "ws://localhost:8080" : "wss://ws.campfire.alimad.co";
        ws = new WebSocket(host);

        ws.onopen = () => {
          if (dot) dot.classList.add("on");
          if (statText) statText.textContent = "AUTHENTICATING";
          ws.send(JSON.stringify({
            type: "auth",
            channel: authChannel,
            password: authPassword,
            role: "listener"
          }));
        };

        ws.onclose = () => {
          if (dot) dot.classList.remove("on");
          if (statText) statText.textContent = "OFFLINE";
          // Only auto-reconnect if we were already authenticated (engine visible)
          if (engineEl.style.display !== "none") {
            setTimeout(connect, 3000);
          }
        };

        ws.onerror = (e) => console.error("Socket Error:", e);

        ws.onmessage = (msg) => {
          try {
            const d = JSON.parse(msg.data);
            if (!d) return;

            // Handle auth response
            if (d.type === "auth") {
              if (d.status === "success") {
                // Save credentials & show engine
                localStorage.setItem("cf_channel", authChannel);
                localStorage.setItem("cf_password", authPassword);
                showEngine();
                if (statText) statText.textContent = "LIVE";
              } else {
                // Auth failed
                showLoginError(d.error || "Authentication failed");
                ws.close();
              }
              return;
            }

            if (d.type === "scan") add(d, true);
            else if (d.type === "history") (d.scans || []).forEach(s => add(s, false));
            else if (d.type === "online_devices") {
              lastIps = d.devices || [];
              lastMeta = d.metadataMap || {};
              updateScanners(lastIps, lastMeta);
            }
            else if (d.type === "listener_count") if (lCount) lCount.textContent = d.count;
          } catch (e) {
            console.error("Payload Parse Error:", e);
          }
        };
      } catch (e) {
        showLoginError("Connection failed. Retrying...");
        setTimeout(connect, 5000);
      }
    }

    // Login button handler
    loginBtn.addEventListener("click", () => {
      const ch = loginChannelInput.value.trim();
      const pw = loginPasswordInput.value.trim();

      if (!ch || !pw) {
        return showLoginError("Channel and password are required");
      }

      loginError.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "CONNECTING...";
      authChannel = ch;
      authPassword = pw;
      connect();
    });

    // Allow Enter key to submit
    [loginChannelInput, loginPasswordInput].forEach(el => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") loginBtn.click();
      });
    });

    async function check(it) {
      if (!it.data || it._status === "checking" || it._status === "valid" || it._status === "invalid") return;

      it._status = "checking";
      render();

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s fetch cap

      try {
        const u = new URL(API);
        u.searchParams.set("c", it.data);

        const r = await fetch(u, { signal: controller.signal });
        if (!r.ok) throw new Error("API Offline");

        const res = await r.json();
        it._status = res && res.status === "valid" ? "valid" : "invalid";
      } catch (e) {
        it._status = "error";
      } finally {
        clearTimeout(timeoutId);
        render();
      }
    }

    function add(it, isNew) {
      if (!it || !it.time) return;
      it._isNew = !!isNew;
      it._status = it._status || "idle";
      if (!isNew && scans.some(s => s.time === it.time && s.data === it.data)) return;

      scans.unshift(it);
      if (scans.length > 200) scans.pop();
      render();
      if (isNew) check(it);
    }

    function render() {
      if (!stream) return;
      stream.innerHTML = "";

      const filtered = scans.filter(s => showHistory || s._isNew);

      filtered.forEach(s => {
        const el = document.createElement("div");
        el.className = "card";

        const currentStatus = (s._status || "idle").toUpperCase();
        let statusColor = "var(--text-dim)";
        let action = `<button class="mini-btn" onclick="triggerCheck('${s.time}')">CHECK</button>`;

        if (s._status === "checking") {
          statusColor = "var(--accent)";
          action = "";
        } else if (s._status === "valid") {
          statusColor = "var(--success)";
          action = "";
        } else if (s._status === "invalid") {
          statusColor = "var(--error)";
          action = "";
        } else if (s._status === "error") {
          statusColor = "var(--error)";
          action = `<button class="mini-btn" onclick="triggerCheck('${s.time}')">RETRY</button>`;
        }

        const formattedTime = (typeof timeago !== 'undefined' && s.time) ? timeago.format(s.time) : (s.time ? new Date(s.time).toLocaleTimeString() : "?");

        el.innerHTML = `
          <div class="card-meta">
            <span class="card-user">${s.scannerId || s.userId || "Client"}</span>
            <span class="card-time">${formattedTime}</span>
          </div>
          <div class="card-data">${s.data || ""}</div>
          <div class="card-actions">
            <div class="status-label" style="color:${statusColor}">${s._status === 'checking' ? 'CHECKING...' : (s._status === 'valid' ? '✓ VALID' : (s._status === 'invalid' ? '✗ INVALID' : (s._status === 'error' ? 'FAILED' : currentStatus)))}</div>
            ${action}
          </div>
        `;
        stream.appendChild(el);
      });

      if (typeof lucide !== 'undefined') {
        try { lucide.createIcons(); } catch (e) { }
      }

      updateScanners(lastIps, lastMeta);
    }

    setInterval(render, 30000);

    window.triggerCheck = (time) => {
      const it = scans.find(s => s.time === time);
      if (it) check(it);
    };

    function updateScanners(ips, meta) {
      if (!scannersEl) return;
      scannersEl.innerHTML = "";
      (ips || []).forEach(ip => {
        const m = meta[ip] || {};
        const scannerScans = scans.filter(s => s.ip === ip);
        const totalCount = scannerScans.length;
        const sessionCount = scannerScans.filter(s => s._isNew).length;

        const el = document.createElement("div");
        el.className = "scanner";
        el.innerHTML = `
          <span class="scanner-name">${m.scanner_user_id || 'Terminal'}</span>
          <span class="scanner-ip">${ip}</span>
          <div class="tooltip">
            <div style="font-size:0.6rem; font-weight:900; color:var(--accent); margin-bottom:0.6rem">DEVICE INFO</div>
            <div class="tooltip-data">
              <div class="tt-row"><span class="tt-label">Brand</span><span>${m.brand || '?'}</span></div>
              <div class="tt-row"><span class="tt-label">Model</span><span>${m.model || '?'}</span></div>
              <div class="tt-row"><span class="tt-label">SDK</span><span>${m.sdkInt || '?'}</span></div>
              <div class="tt-row"><span class="tt-label">Connected</span><span>${timeago.format(new Date(m.last_connected)) || '?'}</span></div>
              <div class="tt-row"><span class="tt-label">Scans</span><span>${sessionCount}</span></div>
              <div class="tt-row"><span class="tt-label">Total Scans</span><span>${totalCount}</span></div>
            </div>
          </div>
        `;
        scannersEl.appendChild(el);
      });
    }

    const checkAllBtn = document.getElementById("checkAll");
    if (checkAllBtn) {
      checkAllBtn.onclick = () => {
        checkAllBtn.style.display = "none";
        scans.filter(s => (showHistory || s._isNew) && (s._status === "idle" || s._status === "error")).forEach(s => check(s));
      };
    }

    const modeNew = document.getElementById("modeNew");
    const modeAll = document.getElementById("modeAll");

    if (modeNew) modeNew.onclick = () => {
      showHistory = false;
      modeNew.classList.add("active");
      checkAllBtn.style.display = "none";
      if (modeAll) modeAll.classList.remove("active");
      render();
    };
    if (modeAll) modeAll.onclick = () => {
      showHistory = true;
      checkAllBtn.style.display = "block";
      modeAll.classList.add("active");
      if (modeNew) modeNew.classList.remove("active");
      render();
    };

    if (typeof lucide !== 'undefined') {
      try { lucide.createIcons(); } catch (e) { }
    }
  </script>
</body>

</html>
